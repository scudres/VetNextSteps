[build]
  base      = "frontend"
  command   = "npm run build"
  publish   = "build"
  functions = "../functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[dev]
  command = "npm start"
  port    = 3000

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — page cannot be embedded in an iframe
    X-Frame-Options = "DENY"

    # Prevent MIME sniffing — browser must honour declared content-type
    X-Content-Type-Options = "nosniff"

    # Disable the legacy XSS auditor — modern browsers removed it; the filter could
    # be exploited on old IE so the correct value is 0 (disabled).
    X-XSS-Protection = "0"

    # Only send the origin (no path/query) in the Referer header to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable unused browser features; browsing-topics=() blocks the Topics API
    # (Privacy Sandbox replacement for the deprecated FLoC / interest-cohort).
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), browsing-topics=()"

    # Content Security Policy
    # Allows: self, inline styles (Tailwind), Google Analytics/GTM, Cloudflare Turnstile
    # Blocks: everything else including injected scripts from unknown origins
    # Violations are reported to /.netlify/functions/csp-report (logged in Netlify Functions tab)
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.pexels.com https://images.unsplash.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://challenges.cloudflare.com; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; upgrade-insecure-requests; report-uri /.netlify/functions/csp-report; report-to csp-endpoint"

    # Reporting API endpoint group — used by report-to in the CSP above (Chrome 96+).
    # report-uri (above) handles all other browsers.
    Reporting-Endpoints = "csp-endpoint=\"https://vetnextstep.com/.netlify/functions/csp-report\""

    # Tell AI crawlers and scrapers not to index or use this content
    X-Robots-Tag = "noai, noimageai"

    # Enforce HTTPS at the browser level (2-year duration, include subdomains, preload-eligible)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Prevent this page being opened in a cross-origin browsing context (protects against
    # cross-origin script injection via window.opener / postMessage attacks)
    Cross-Origin-Opener-Policy = "same-origin"

    # Prevent other origins from embedding this site's resources (images, scripts, etc.)
    Cross-Origin-Resource-Policy = "same-origin"

    # Disallow Adobe Flash / Silverlight cross-domain policy files
    X-Permitted-Cross-Domain-Policies = "none"

# Long-lived cache for versioned static assets (JS/CSS bundles have content hashes)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No caching for HTML (ensure fresh content on update)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
