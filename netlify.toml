[build]
  base      = "frontend"
  command   = "npm run build"
  publish   = "build"
  functions = "../functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[dev]
  command = "npm start"
  port    = 3000

# ─── Routing ────────────────────────────────────────────────────────────────
#
# react-snap prerenders every route below to its own static <path>/index.html
# at build time. Netlify's default clean-URL resolution does not reliably
# resolve an extension-less request like "/uk" to "/uk/index.html" ahead of
# the SPA fallback rule further down — so without an explicit rule here,
# every one of these URLs served the homepage shell to first-pass crawlers.
#
# Each rule below is an exact match listed before the wildcard fallback, so
# redirect matching (which Netlify evaluates top-to-bottom, first match wins)
# always serves the real prerendered page for a real route. `force = true`
# removes any ambiguity with Netlify's own clean-URL handling.
#
# This list should mirror frontend/public/sitemap.xml plus the small number
# of intentionally noindex pages (jobs, legal, search) that still need to
# resolve for direct navigation.

[[redirects]]
  from  = "/uk"
  to    = "/uk/index.html"
  status = 200
  force = true

[[redirects]]
  from  = "/uk/first-role"
  to    = "/uk/first-role/index.html"
  status = 200
  force = true

