<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#1e40af" />
        <link rel="icon" href="/favicon.ico" sizes="32x32" />
        <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/manifest.json" />

        <!-- AI scraper opt-out -->
        <meta name="robots" content="noai, noimageai" />

        <!--
          Title, description, canonical, and Open Graph / Twitter Card tags are
          NOT set here — not even a fallback <title>. Every routed page sets
          its own via react-helmet-async (see each component's <Helmet>
          block), and react-snap bakes those per-page tags into the
          prerendered HTML at build time. react-helmet-async creates its own
          <title> node in the browser rather than overwriting one already in
          the markup, so a static placeholder tag here would survive
          alongside the real one in every snapshot — two <title> elements on
          every page, which is exactly what this file previously had for
          canonical and OG tags too. Leaving no title element at all means
          Helmet's own node is the only one that ever exists. If a route is
          ever added without its own <Helmet>, the tab is blank; that's the
          intended, visible failure mode — better than a silently duplicated
          fallback.
        -->

        <!-- Preconnect to analytics/tag-manager so DNS+TLS resolve during parse -->
        <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
        <link rel="preconnect" href="https://www.google-analytics.com" crossorigin />
        <link rel="dns-prefetch" href="https://stats.g.doubleclick.net" />

        <!-- Preload ga-init.js so the file is cached when the sync script tag executes -->
        <link rel="preload" href="/ga-init.js" as="script" />

        <!-- Google tag (gtag.js) — config in ga-init.js to remove CSP unsafe-inline -->
        <script src="/ga-init.js"></script>
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-YPE9MES8JY"></script>
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
