<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#1e40af" />
        <link rel="icon" href="/favicon.ico" sizes="32x32" />
        <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/manifest.json" />
        <meta
            name="description"
            content="Licensing steps, visa options, and training resources for vets working in or moving to the UK, USA, Canada, or Australia."
        />

        <!-- AI scraper opt-out -->
        <meta name="robots" content="noai, noimageai" />

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://vetnextstep.com/" />
        <meta property="og:title" content="Veterinary Career Progression Hub | VetNextStep" />
        <meta
            property="og:description"
            content="Graduate programmes, internships, residencies, postgraduate certificates, and licensing guides for the UK, USA, Canada, and Australia."
        />
        <meta property="og:image" content="https://vetnextstep.com/og-image.png" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Veterinary Career Progression Hub | VetNextStep" />
        <meta
            name="twitter:description"
            content="Graduate programmes, internships, residencies, postgraduate certificates, and licensing guides for the UK, USA, Canada, and Australia."
        />
        <meta name="twitter:image" content="https://vetnextstep.com/og-image.png" />

        <!-- Canonical -->
        <link rel="canonical" href="https://vetnextstep.com/" />

        <!-- Preconnect to analytics/tag-manager so DNS+TLS resolve during parse -->
        <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin />
        <link rel="preconnect" href="https://www.google-analytics.com" crossorigin />
        <link rel="dns-prefetch" href="https://stats.g.doubleclick.net" />

        <!-- Preload ga-init.js so the file is cached when the sync script tag executes -->
        <link rel="preload" href="/ga-init.js" as="script" />

        <title>Veterinary Career Progression Hub | VetNextStep</title>
        <!-- Google tag (gtag.js) — config in ga-init.js to remove CSP unsafe-inline -->
        <script src="/ga-init.js"></script>
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-YPE9MES8JY"></script>
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
